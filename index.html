<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lienta System</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #1f2933;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }

    main {
      width: 100%;
      max-width: 430px;
    }

    .brand {
      margin-bottom: 18px;
    }

    h1 {
      font-size: 28px;
      line-height: 1.1;
      margin-bottom: 6px;
    }

    p {
      color: #667085;
      font-size: 14px;
    }

    .system-list {
      display: grid;
      gap: 12px;
    }

    a {
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 86px;
      padding: 18px;
      border: 1px solid #d7dde5;
      border-radius: 8px;
      background: #fff;
      color: inherit;
      text-decoration: none;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
    }

    a:active {
      transform: scale(0.99);
    }

    .icon {
      width: 46px;
      height: 46px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex: 0 0 auto;
    }

    .stock { background: #e8f0fe; }
    .appliances { background: #e7f8ee; }

    .title {
      display: block;
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 3px;
    }

    .sub {
      display: block;
      font-size: 13px;
      color: #667085;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <main>
    <div class="brand">
      <h1>Lienta System</h1>
      <p>Select a system to continue</p>
    </div>

    <div class="system-list">
      <a href="/inventory/">
        <span class="icon stock">IN</span>
        <span>
          <span class="title">Inventory Record</span>
          <span class="sub">Stock in, stock out, returns, adjustments and reports</span>
        </span>
      </a>

      <a href="/appliances/">
        <span class="icon appliances">AP</span>
        <span>
          <span class="title">Heater & Dryer Tracker</span>
          <span class="sub">CityEnergy incoming, issue, return, installed and search</span>
        </span>
      </a>
    </div>
  </main>
</body>
</html>

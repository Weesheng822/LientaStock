<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Lienta System</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      padding: 22px;

      display: flex;
      align-items: center;
      justify-content: center;

      overflow-x: hidden;

      font-family: Arial, sans-serif;

      color: #1f2933;
      background: #eef3f8;
    }

    body::before {
      content: "";

      position: fixed;
      inset: 0;
      z-index: -2;

      background:
        linear-gradient(
          135deg,
          rgba(20, 83, 45, .10),
          transparent 34%
        ),
        linear-gradient(
          315deg,
          rgba(30, 58, 95, .13),
          transparent 38%
        ),
        repeating-linear-gradient(
          0deg,
          rgba(31, 41, 55, .055) 0 1px,
          transparent 1px 42px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(31, 41, 55, .045) 0 1px,
          transparent 1px 42px
        ),
        #eef3f8;
    }

    body::after {
      content: "";

      position: fixed;
      left: -10%;
      right: -10%;
      bottom: -16%;

      height: 42vh;

      z-index: -1;

      background: #dde7ef;

      transform: skewY(-5deg);

      border-top: 1px solid rgba(31, 41, 55, .08);
    }

    main {
      width: 100%;
      max-width: 520px;
    }

    .brand {
      margin-bottom: 20px;
      padding-left: 2px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;

      height: 30px;
      padding: 0 11px;

      border: 1px solid rgba(31, 41, 55, .14);
      border-radius: 999px;

      background: rgba(255, 255, 255, .72);

      color: #475467;

      font-size: 12px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;

      margin-bottom: 14px;

      backdrop-filter: blur(8px);
    }

    h1 {
      font-size: 34px;
      line-height: 1.05;

      margin-bottom: 8px;

      color: #102033;
    }

    p {
      color: #5c6676;
      font-size: 15px;
      line-height: 1.45;
    }

    .system-list {
      display: grid;
      gap: 13px;
    }

    .system-card {
      position: relative;

      display: grid;
      grid-template-columns: 54px 1fr 28px;
      align-items: center;
      gap: 15px;

      min-height: 104px;
      padding: 18px;

      border: 1px solid rgba(31, 41, 55, .13);
      border-radius: 10px;

      background: rgba(255, 255, 255, .86);

      color: inherit;
      text-decoration: none;

      box-shadow: 0 14px 30px rgba(15, 23, 42, .10);

      backdrop-filter: blur(10px);

      overflow: hidden;
    }

    .system-card::before {
      content: "";

      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;

      width: 5px;

      background: #1e3a5f;
    }

    .system-card:nth-child(2)::before {
      background: #166534;
    }

    .system-card:hover {
      border-color: rgba(31, 41, 55, .26);
      transform: translateY(-1px);
    }

    .icon {
      width: 54px;
      height: 54px;

      display: flex;
      align-items: center;
      justify-content: center;

      border-radius: 10px;

      font-size: 17px;
      font-weight: 800;
      letter-spacing: .02em;

      flex: 0 0 auto;
    }

    .stock {
      background: #dbeafe;
      color: #1e3a5f;
    }

    .appliances {
      background: #dcfce7;
      color: #166534;
    }

    .title {
      display: block;

      margin-bottom: 5px;

      font-size: 18px;
      font-weight: 800;

      color: #172033;
    }

    .sub {
      display: block;

      font-size: 13px;
      line-height: 1.35;

      color: #667085;
    }

    .arrow {
      width: 28px;
      height: 28px;

      display: flex;
      align-items: center;
      justify-content: center;

      border-radius: 50%;

      background: #f2f5f8;

      color: #344054;

      font-size: 18px;
      font-weight: 700;
    }

    @media (max-width: 460px) {

      body {
        align-items: flex-start;
        padding-top: 34px;
      }

      h1 {
        font-size: 30px;
      }

      .system-card {
        grid-template-columns: 48px 1fr 24px;

        min-height: 98px;
        padding: 16px;
      }

      .icon {
        width: 48px;
        height: 48px;
      }

      .sub {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>

  <main>

    <div class="brand">

      <div class="eyebrow">
        Lienta Work Hub
      </div>

      <h1>
        Lienta System
      </h1>

      <p>
        Select a system to continue
      </p>

    </div>

    <div class="system-list">

      <a
        class="system-card"
        href="/inventory/">

        <span class="icon stock">
          IN
        </span>

        <span>
          <span class="title">
            Inventory Record
          </span>

          <span class="sub">
            Stock in, stock out, returns,
            adjustments and reports
          </span>
        </span>

        <span class="arrow">
          &rsaquo;
        </span>

      </a>

      <a
        class="system-card"
        href="/appliances/">

        <span class="icon appliances">
          AP
        </span>

        <span>
          <span class="title">
            Heater & Dryer Tracker
          </span>

          <span class="sub">
            CityEnergy incoming, issue,
            return, installed and search
          </span>
        </span>

        <span class="arrow">
          &rsaquo;
        </span>

      </a>

    </div>

  </main>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heater & Dryer Tracker</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #fff;
    }

    .back-main {
      position: fixed;
      left: 14px;
      bottom: 14px;
      z-index: 1000;

      display: inline-flex;
      align-items: center;

      min-height: 42px;
      padding: 0 14px;

      border-radius: 8px;

      background: #111827;
      color: #fff;

      font-family: Arial, sans-serif;
      font-size: 13px;
      font-weight: 700;

      text-decoration: none;

      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.18);
    }

    .back-main:active {
      transform: scale(0.98);
    }

    iframe {
      width: 100%;
      height: 100vh;
      border: 0;
      display: block;
    }
  </style>
</head>

<body>

  <a class="back-main" href="/">
    Back to Main Page
  </a>

  <iframe
    src="https://appliances-records.vercel.app"

</html>
